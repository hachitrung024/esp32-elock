# --- WiFi (ESP32 driver) ---
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_ESP32=y
CONFIG_WIFI_USAGE_MODE_STA_AP=y

# --- Networking ---
CONFIG_NETWORKING=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_IF_MAX_IPV6_COUNT=2
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16

# --- POSIX needed by HTTP server (eventfd, etc.) ---
CONFIG_POSIX_API=y
CONFIG_EVENTFD=y
CONFIG_ZVFS_EVENTFD_MAX=8
CONFIG_ZVFS_POLL_MAX=16

# --- HTTP server (HTTP/1.1 only, no TLS) ---
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_PARSER_URL=y
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_MAX_CLIENTS=3
CONFIG_HTTP_SERVER_MAX_URL_LENGTH=128

# --- Settings on NVS for WiFi credential persistence ---
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# --- GPIO + logging ---
CONFIG_GPIO=y
CONFIG_LOG=y
CONFIG_NET_LOG=y

# --- Stacks ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# --- Reboot ---
CONFIG_REBOOT=y
