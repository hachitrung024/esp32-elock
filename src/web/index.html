<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartLock Premium</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  /* Bright Color System */
  --bg-primary: #F0F4F8;
  --bg-secondary: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F8FAFC;
  
  --blue-50: #EFF6FF;
  --blue-100: #DBEAFE;
  --blue-200: #BFDBFE;
  --blue-300: #93C5FD;
  --blue-400: #60A5FA;
  --blue-500: #3B82F6;
  --blue-600: #2563EB;
  --blue-700: #1D4ED8;
  
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-muted: #64748B;
  
  --success: #10B981;
  --success-bg: rgba(16, 185, 129, 0.15);
  --warning: #F59E0B;
  --warning-bg: rgba(245, 158, 11, 0.15);
  --error: #EF4444;
  --error-bg: rgba(239, 68, 68, 0.15);
  
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

* { 
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body { 
  margin: 0; 
  padding: 0;
  width: 100%;
  height: 100%;
}

body {
  font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #E0E7FF 0%, #F0F4F8 50%, #DBEAFE 100%);
  color: var(--text-primary);
  padding: 16px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.app {
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Status Overview - Lock + Sensors Combined */
.status-overview {
  display: flex;
  gap: 12px;
  background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
  border: 2px solid #93C5FD;
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  box-shadow: var(--shadow-md);
  margin-bottom: 16px;
}

.lock-section {
  flex: 3;
  display: flex;
  justify-content: center;
  align-items: center;
  border-right: 2px solid rgba(147, 197, 253, 0.5);
  padding-right: 16px;
}

.lock-status {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-direction: row;
}

.lock-icon-large {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
}

.lock-icon-large svg {
  width: 32px;
  height: 32px;
  position: relative;
  z-index: 1;
  transition: all 0.3s ease;
}

.lock-icon-large.locked {
  background: linear-gradient(135deg, #D1FAE5 0%, #A7F3D0 100%);
  border: 2px solid #10B981;
  box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
  animation: pulse-success 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.lock-icon-large.locked svg {
  fill: #059669;
}

.lock-icon-large.unlocked {
  background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
  border: 2px solid #EF4444;
  box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
  animation: pulse-error 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.lock-icon-large.unlocked svg {
  fill: #DC2626;
}

.lock-icon-large.neutral {
  background: linear-gradient(135deg, #F1F5F9 0%, #E2E8F0 100%);
  border: 2px solid #CBD5E1;
}

.lock-icon-large.neutral svg {
  fill: var(--text-muted);
}

@keyframes pulse-success {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
  }
  50% {
    box-shadow: 0 0 0 12px rgba(16, 185, 129, 0);
  }
}

@keyframes pulse-error {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
  }
  50% {
    box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
  }
}

.lock-status-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.sensors-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
  padding-left: 16px;
}

.sensor-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.lock-icon-large {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.lock-icon-large svg {
  width: 56px;
  height: 56px;
  position: relative;
  z-index: 1;
  transition: all 0.3s ease;
}

.lock-icon-large.locked {
  background: var(--success-bg);
  box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
  animation: pulse-success 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.lock-icon-large.locked svg {
  fill: var(--success);
}

.lock-icon-large.unlocked {
  background: var(--error-bg);
  box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
  animation: pulse-error 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.lock-icon-large.unlocked svg {
  fill: var(--error);
}

.lock-icon-large.neutral {
  background: rgba(100, 116, 139, 0.1);
}

.lock-icon-large.neutral svg {
  fill: var(--text-muted);
}

@keyframes pulse-success {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
  }
  50% {
    box-shadow: 0 0 0 20px rgba(16, 185, 129, 0);
  }
}

@keyframes pulse-error {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
  }
  50% {
    box-shadow: 0 0 0 20px rgba(239, 68, 68, 0);
  }
}

.lock-status-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.sensors-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 16px;
  padding-left: 20px;
}

.sensor-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sensor-icon {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #DBEAFE 0%, #E0E7FF 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.sensor-icon svg {
  width: 16px;
  height: 16px;
  fill: var(--blue-600);
}

.sensor-value {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}

/* PIN Section */
.pin-section {
  background: var(--bg-card);
  border: 1px solid rgba(59, 130, 246, 0.2);
  border-radius: var(--radius-xl);
  padding: 28px 24px 20px;
  box-shadow: var(--shadow-xl);
}

/* WiFi Status Footer */
.wifi-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: linear-gradient(135deg, #FFFFFF 0%, #F0F9FF 100%);
  border: 1px solid #BAE6FD;
  border-radius: var(--radius-lg);
  margin-top: 8px;
  box-shadow: var(--shadow-sm);
}

.wifi-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.wifi-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
}

.wifi-icon svg {
  width: 18px;
  height: 18px;
  position: relative;
  z-index: 1;
}

.wifi-icon.success {
  background: var(--success-bg);
}

.wifi-icon.success svg {
  fill: var(--success);
}

.wifi-icon.warning {
  background: var(--warning-bg);
}

.wifi-icon.warning svg {
  fill: var(--warning);
}

.wifi-icon.neutral {
  background: rgba(100, 116, 139, 0.1);
}

.wifi-icon.neutral svg {
  fill: var(--text-muted);
}

.wifi-text {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
}

.config-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--blue-400);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s ease;
}

.config-link:hover {
  color: var(--blue-300);
}

.config-link svg {
  width: 12px;
  height: 12px;
  fill: currentColor;
}

.pin-header {
  text-align: center;
  margin-bottom: 16px;
}

.pin-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 14px;
}

.pin-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 6px;
}

.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #E2E8F0;
  border: 2px solid #CBD5E1;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.pin-dot.filled {
  background: linear-gradient(135deg, var(--blue-500) 0%, var(--blue-600) 100%);
  border-color: var(--blue-500);
  box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
  transform: scale(1.1);
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}

.key {
  appearance: none;
  border: none;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 600;
  height: 56px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  border: 2px solid #E2E8F0;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.key::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(59, 130, 246, 0.2);
  transform: translate(-50%, -50%);
  transition: width 0.4s ease, height 0.4s ease;
}

.key:hover {
  background: var(--blue-50);
  border-color: var(--blue-300);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.key:active {
  transform: scale(0.95);
}

.key:active::before {
  width: 100%;
  height: 100%;
}

.key span {
  position: relative;
  z-index: 1;
}

.key.delete {
  background: linear-gradient(135deg, #FEE2E2 0%, #FEF3C7 100%);
  border-color: #FCA5A5;
}

.key.delete:hover {
  background: linear-gradient(135deg, #FECACA 0%, #FDE68A 100%);
  border-color: #F87171;
}

.key.delete svg {
  width: 24px;
  height: 24px;
  fill: var(--error);
}

.key.submit {
  background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
  color: white;
  font-size: 16px;
  font-weight: 700;
  border: none;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
  letter-spacing: 0.02em;
}

.key.submit:hover {
  background: linear-gradient(135deg, #60A5FA 0%, #A78BFA 100%);
  box-shadow: 0 6px 16px rgba(59, 130, 246, 0.5);
  transform: translateY(-2px);
}

.key.submit::before {
  background: rgba(255, 255, 255, 0.2);
}

.feedback {
  min-height: 24px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  padding: 8px;
  border-radius: var(--radius-sm);
  transition: all 0.3s ease;
}

.feedback.ok {
  color: var(--success);
  background: var(--success-bg);
}

.feedback.err {
  color: var(--error);
  background: var(--error-bg);
}

/* Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.app > * {
  animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}

.app > *:nth-child(1) { animation-delay: 0.05s; }
.app > *:nth-child(2) { animation-delay: 0.1s; }
.app > *:nth-child(3) { animation-delay: 0.15s; }
.app > *:nth-child(4) { animation-delay: 0.2s; }

/* Responsive */
@media (max-width: 480px) {
  body {
    padding: 16px;
  }
  
  .app {
    gap: 20px;
  }
  
  .status-card,
  .sensor-card {
    padding: 16px;
  }
  
  .pin-section {
    padding: 24px 20px 20px;
  }
  
  .key {
    height: 56px;
    font-size: 20px;
  }
}
</style>
</head>
<body>
<main class="app">
  <section class="status-overview">
    <div class="lock-section">
      <div id="lock-status" class="lock-status">
        <div class="lock-icon-large neutral">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C9.243 2 7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zM9 7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9V7zm4 10.723V19h-2v-1.277c-.595-.347-1-.984-1-1.723 0-1.103.897-2 2-2s2 .897 2 2c0 .738-.405 1.376-1 1.723z"/>
          </svg>
        </div>
        <div id="lock-status-text" class="lock-status-text">--</div>
      </div>
    </div>

    <div class="sensors-section">
      <div class="sensor-row">
        <div class="sensor-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4zm-4-8c0-.55.45-1 1-1s1 .45 1 1h-1v1h1v2h-1v1h1v2h-2V5z"/>

<script>
(function () {
  var pin = "";
  var dots = document.querySelectorAll("#pin-dots .pin-dot");
  var feedback = document.getElementById("feedback");

  function renderPin() {
    for (var i = 0; i < dots.length; i++) {
      dots[i].classList.toggle("filled", i < pin.length);
    }
  }

  function setFeedback(msg, kind) {
    feedback.textContent = msg || "\u00A0";
    feedback.className = "feedback" + (kind ? " " + kind : "");
  }

  function clearPin() { 
    pin = ""; 
    renderPin(); 
  }

  document.getElementById("keypad").addEventListener("click", function (e) {
    var btn = e.target.closest("button.key");
    if (!btn) return;
    var k = btn.dataset.k;
    
    if (k === "back") {
      pin = pin.slice(0, -1);
      renderPin();
      setFeedback("");
    } else if (k === "ok") {
      submitPin();
    } else if (/^[0-9]$/.test(k)) {
      if (pin.length < 6) {
        pin += k;
        renderPin();
        setFeedback("");
      }
    }
  });

  function submitPin() {
    if (pin.length < 6) {
      setFeedback("Vui lòng nhập đủ 6 số", "err");
      return;
    }
    
    fetch("/unlock", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "pin=" + encodeURIComponent(pin)
    }).then(function (r) {
      if (r.status === 200) {
        setFeedback("✓ Đã mở khóa thành công", "ok");
      } else if (r.status === 403) {
        setFeedback("✗ Mã PIN không đúng", "err");
      } else {
        setFeedback("✗ Lỗi kết nối", "err");
      }
      clearPin();
    }).catch(function () {
      setFeedback("✗ Không thể kết nối", "err");
      clearPin();
    });
  }

  var lockIconLarge = document.getElementById("lock-status");
  var lockStatusText = document.getElementById("lock-status-text");
  var wifiIcon = document.getElementById("wifi-icon");
  var wifiText = document.getElementById("wifi-text");
  var wifiConfig = document.getElementById("wifi-config");
  var tempEl = document.getElementById("temp");
  var humEl = document.getElementById("humidity");

  var lockSvg = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C9.243 2 7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zM9 7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9V7zm4 10.723V19h-2v-1.277c-.595-.347-1-.984-1-1.723 0-1.103.897-2 2-2s2 .897 2 2c0 .738-.405 1.376-1 1.723z"/></svg>';
  var unlockSvg = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C9.243 2 7 4.243 7 7h2c0-1.654 1.346-3 3-3s3 1.346 3 3v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm1 14.723V19h-2v-1.277c-.595-.347-1-.984-1-1.723 0-1.103.897-2 2-2s2 .897 2 2c0 .738-.405 1.376-1 1.723z"/></svg>';

  function applyStatus(s) {
    if (typeof s.locked === "boolean") {
      var lockIcon = lockIconLarge.querySelector('.lock-icon-large');
      lockIcon.className = "lock-icon-large " + (s.locked ? "locked" : "unlocked");
      lockIcon.innerHTML = s.locked ? lockSvg : unlockSvg;
      lockStatusText.textContent = s.locked ? "Đang khóa" : "Đã mở";
    }
    
    if (typeof s.wifi === "string") {
      if (s.wifi === "sta") {
        wifiIcon.className = "wifi-icon success";
        wifiText.textContent = "Đã kết nối";
        wifiConfig.hidden = true;
      } else if (s.wifi === "ap") {
        wifiIcon.className = "wifi-icon warning";
        wifiText.textContent = "Chế độ AP";
        wifiConfig.hidden = false;
      } else if (s.wifi === "connecting") {
        wifiIcon.className = "wifi-icon warning";
        wifiText.textContent = "Đang kết nối...";
        wifiConfig.hidden = true;
      } else {
        wifiIcon.className = "wifi-icon neutral";
        wifiText.textContent = "Không kết nối";
        wifiConfig.hidden = true;
      }
    }
    
    tempEl.textContent = (s.temp == null) ? "--°C" : s.temp + "°C";
    humEl.textContent = (s.humidity == null) ? "--%" : s.humidity + "%";
  }

  function poll() {
    fetch("/status", { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (s) { if (s) applyStatus(s); })
      .catch(function () { /* keep last known */ });
  }
  
  poll();
  setInterval(poll, 1000);
})();
</script>
